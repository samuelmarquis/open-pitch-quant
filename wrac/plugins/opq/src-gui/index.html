<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenPitchQuant</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app">
      <div id="plate">
        <div id="sediment"></div>
        <div id="grove-wrap">
          <canvas id="grove"></canvas>
        </div>
        <div id="label">
          <h1 id="plugin-name">OPEN PITCH QUANT</h1>
          <div id="fig-caption">
            fig. 1 — pitch-object de-mixing on a chromatic grid
          </div>
          <div id="masthead-meta"></div>
          <div id="scale-legend"></div>
        </div>
        <button id="bypass" type="button">
          <img src="/shrine/seal.png" alt="" draggable="false" />
          <span>DRY</span>
        </button>
        <div id="mode-switch">
          <button type="button" data-mode="cosmos" class="is-active">
            chart A · cosmos
          </button>
          <button type="button" data-mode="strata">chart B · strata</button>
        </div>
        <div id="demo-badge" hidden>demo feed · phylovox trace</div>
        <div id="wardens"></div>
        <div id="rites"></div>
        <img id="tally0" src="/shrine/tally0.png" alt="" draggable="false" />
        <footer id="status">
          <span id="status-left"></span>
          <span id="status-right"></span>
        </footer>
      </div>
      <button
        class="resize-grip"
        id="resize-grip"
        type="button"
        aria-label="Resize plugin window"
      >
        <svg width="18" height="18" viewBox="0 0 12 12" aria-hidden="true">
          <path
            d="M2 10L10 2M5 10L10 5M8 10L10 8"
            fill="none"
            stroke="currentColor"
            stroke-width="1"
            stroke-linecap="round"
          />
        </svg>
      </button>
    </div>
  </body>
</html>
